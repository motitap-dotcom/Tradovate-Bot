name: Bot Health Check

# Runs every 15 minutes during US market hours (Mon-Fri 9:25-17:05 ET)
# and once per hour outside market hours for general liveness
on:
  schedule:
    # Every 15 min during market hours (13:25-21:05 UTC = 9:25 AM - 5:05 PM ET)
    - cron: '25,40,55 13 * * 1-5'
    - cron: '10,25,40,55 14-20 * * 1-5'
    - cron: '5 21 * * 1-5'
    # Once per hour outside market hours (liveness check)
    - cron: '0 0-12,22-23 * * 1-5'
    # Weekend: once every 6 hours
    - cron: '0 */6 * * 0,6'
  workflow_dispatch:

env:
  BOT_DIR: /root/tradovate-bot
  SERVICE_NAME: tradovate-bot

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check server_status.json
        id: file-check
        run: |
          echo "## Bot Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ ! -f server_status.json ]; then
            echo "status=missing" >> $GITHUB_OUTPUT
            echo "**server_status.json not found.** Server cron may not be running." >> $GITHUB_STEP_SUMMARY
          else
            echo "status=found" >> $GITHUB_OUTPUT
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat server_status.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Analyze status
        if: steps.file-check.outputs.status == 'found'
        id: analyze
        run: |
          python3 -c "
          import json, datetime, sys, os

          d = json.load(open('server_status.json'))
          bot_active = d.get('bot_active', False)
          ts = d.get('timestamp', '')

          age_minutes = -1
          if ts:
              dt = datetime.datetime.fromisoformat(ts.replace('Z', '+00:00'))
              age_minutes = int((datetime.datetime.now(datetime.timezone.utc) - dt).total_seconds() / 60)

          print(f'bot_active={bot_active}')
          print(f'age_minutes={age_minutes}')

          # Write outputs
          gh_output = os.environ.get('GITHUB_OUTPUT', '')
          if gh_output:
              with open(gh_output, 'a') as f:
                  f.write(f'bot_active={bot_active}\n')
                  f.write(f'age_minutes={age_minutes}\n')
                  stale = 'true' if age_minutes > 15 else 'false'
                  f.write(f'stale={stale}\n')

          # Summary
          gh_summary = os.environ.get('GITHUB_STEP_SUMMARY', '')
          if gh_summary:
              with open(gh_summary, 'a') as f:
                  f.write('\n')
                  if bot_active:
                      f.write('### Bot is RUNNING\n')
                  else:
                      f.write('### Bot is DOWN\n')
                  f.write(f'\nStatus age: {age_minutes} minutes\n')
                  if age_minutes > 15:
                      f.write('\n**WARNING:** Status is stale (>15 min). Server cron may have stopped.\n')
          " 2>/dev/null || echo "Parse failed"

      # SSH auto-restart if bot is down and SSH is configured
      - name: Auto-restart bot via SSH
        if: |
          (vars.SERVER_HOST != '' || secrets.VPS_HOST != '') &&
          (steps.file-check.outputs.status == 'missing' ||
           steps.analyze.outputs.bot_active == 'False' ||
           steps.analyze.outputs.stale == 'true')
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SERVER_HOST || secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER || vars.SERVER_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY || secrets.SERVER_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            echo "=== Health Check Auto-Recovery ==="
            SERVICE="${{ env.SERVICE_NAME }}"
            BOT_DIR="${{ env.BOT_DIR }}"

            # Pull latest code first
            cd "$BOT_DIR" && git pull origin main 2>/dev/null || true

            # Check and restart
            if systemctl is-active --quiet "$SERVICE"; then
              echo "Bot is actually running — status file may be stale."
              echo "Re-running cron to update status..."
              bash server_cron.sh 2>&1 | tail -5
            else
              echo "Bot is DOWN — restarting..."
              systemctl restart "$SERVICE"
              sleep 5
              if systemctl is-active --quiet "$SERVICE"; then
                echo "RESTART SUCCESSFUL"
                systemctl status "$SERVICE" --no-pager | head -5
              else
                echo "RESTART FAILED"
                journalctl -u "$SERVICE" --no-pager -n 20
              fi
            fi

      - name: Final summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          if [ "${{ vars.SERVER_HOST }}" != "" ]; then
            echo "SSH auto-recovery: **enabled**" >> $GITHUB_STEP_SUMMARY
          else
            echo "SSH auto-recovery: **disabled** (set SERVER_HOST variable to enable)" >> $GITHUB_STEP_SUMMARY
          fi
