name: Bot Status Check

# Triggers on push to claude/* branches or manually
on:
  push:
    branches:
      - 'claude/**'
  workflow_dispatch:

env:
  DEPLOY_BRANCH: claude/tradovate-api-research-DPnl9

jobs:
  check-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_BRANCH }}
          fetch-depth: 1

      - name: Read server_status.json
        id: status
        run: |
          echo "## Bot Status Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ ! -f server_status.json ]; then
            echo "**server_status.json not found.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The server hasn't pushed status yet." >> $GITHUB_STEP_SUMMARY
            echo "Make sure \`server_cron.sh\` is running on the server:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "crontab -e" >> $GITHUB_STEP_SUMMARY
            echo "*/5 * * * * cd /root/tradovate-bot && bash server_cron.sh >> /var/log/tradovate-cron.log 2>&1" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "status=missing" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat server_status.json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse key fields
          BOT_ACTIVE=$(python3 -c "import json; d=json.load(open('server_status.json')); print(d.get('bot_active', False))" 2>/dev/null || echo "unknown")
          TIMESTAMP=$(python3 -c "import json; d=json.load(open('server_status.json')); print(d.get('timestamp', 'unknown'))" 2>/dev/null || echo "unknown")
          COMMIT=$(python3 -c "import json; d=json.load(open('server_status.json')); print(d.get('git_commit', 'unknown'))" 2>/dev/null || echo "unknown")

          if [ "$BOT_ACTIVE" = "True" ]; then
            echo "### ✅ Bot is RUNNING" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Bot is DOWN" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Last report | \`$TIMESTAMP\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Server commit | \`$COMMIT\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bot active | \`$BOT_ACTIVE\` |" >> $GITHUB_STEP_SUMMARY

          echo "status=$BOT_ACTIVE" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Check staleness
        run: |
          if [ ! -f server_status.json ]; then
            echo "No status file yet."
            exit 0
          fi

          TIMESTAMP=$(python3 -c "
          import json, datetime
          d = json.load(open('server_status.json'))
          ts = d.get('timestamp', '')
          if ts:
              dt = datetime.datetime.fromisoformat(ts.replace('Z', '+00:00'))
              age = (datetime.datetime.now(datetime.timezone.utc) - dt).total_seconds()
              print(int(age))
          else:
              print(-1)
          " 2>/dev/null || echo "-1")

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$TIMESTAMP" -gt 600 ] 2>/dev/null; then
            MINS=$((TIMESTAMP / 60))
            echo "### ⚠️ Status is ${MINS} minutes old — server may not be polling" >> $GITHUB_STEP_SUMMARY
          elif [ "$TIMESTAMP" -ge 0 ] 2>/dev/null; then
            MINS=$((TIMESTAMP / 60))
            echo "### 🕐 Status is ${MINS} minutes old" >> $GITHUB_STEP_SUMMARY
          fi
