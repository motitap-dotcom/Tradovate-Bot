name: Auto-merge to main

# Triggers on push to any claude/* branch — tests and merges into main.
# Actual deploy handled by server_cron.sh (polls every 5 min).
on:
  push:
    branches:
      - 'claude/**'
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'server_status.json'
      - 'system_status.json'

env:
  DEPLOY_BRANCH: main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create dummy .env for tests
        run: cp .env.example .env

      - name: Syntax check
        run: |
          python -m py_compile bot.py
          python -m py_compile tradovate_api.py
          python -m py_compile strategies.py
          python -m py_compile risk_manager.py
          python -m py_compile config.py

      - name: Run tests
        continue-on-error: true
        run: python test_all.py

  merge:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge to main
        run: |
          git fetch origin ${{ env.DEPLOY_BRANCH }}
          git checkout ${{ env.DEPLOY_BRANCH }}
          git merge ${{ github.sha }} --no-edit -m "Auto-merge ${{ github.ref_name }} → ${{ env.DEPLOY_BRANCH }}"
          git push origin ${{ env.DEPLOY_BRANCH }}

      - name: Summary
        if: always()
        run: |
          echo "## Auto-merge" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** \`${{ env.DEPLOY_BRANCH }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Server picks up changes via \`server_cron.sh\` (every 5 min)." >> $GITHUB_STEP_SUMMARY
