name: Auto-merge & Deploy

# Triggers on push to any claude/* branch EXCEPT the deploy target itself
on:
  push:
    branches:
      - 'claude/**'
      - '!claude/tradovate-api-research-DPnl9'
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'server_status.json'

env:
  DEPLOY_BRANCH: claude/tradovate-api-research-DPnl9
  BOT_DIR: /root/tradovate-bot
  SERVICE_NAME: tradovate-bot

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create dummy .env for tests
        run: cp .env.example .env

      - name: Syntax check
        run: |
          python -m py_compile bot.py
          python -m py_compile tradovate_api.py
          python -m py_compile strategies.py
          python -m py_compile risk_manager.py
          python -m py_compile config.py

      - name: Run tests
        continue-on-error: true
        run: python test_all.py

  merge-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge to deploy branch
        run: |
          git fetch origin ${{ env.DEPLOY_BRANCH }}
          git checkout ${{ env.DEPLOY_BRANCH }}
          git merge ${{ github.sha }} --no-edit -m "Auto-merge ${{ github.ref_name }} → ${{ env.DEPLOY_BRANCH }}"
          git push origin ${{ env.DEPLOY_BRANCH }}

      # SSH deploy (only if SERVER_HOST is configured as a repo variable)
      - name: Deploy to server via SSH
        if: vars.SERVER_HOST != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER || 'root' }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: SERVER_GH_PAT
          script_stop: true
          script: |
            echo "=== Auto-merge deploy: ${{ github.ref_name }} → ${{ env.DEPLOY_BRANCH }} ==="
            BOT_DIR="${{ env.BOT_DIR }}"
            cd "$BOT_DIR" || exit 1
            git fetch origin ${{ env.DEPLOY_BRANCH }}
            git reset --hard origin/${{ env.DEPLOY_BRANCH }}
            echo "Now at: $(git log -1 --oneline)"

            # Update deps if needed
            [ -f venv/bin/pip ] && venv/bin/pip install -r requirements.txt -q 2>&1 | tail -3

            # Restart bot
            systemctl restart ${{ env.SERVICE_NAME }}
            sleep 3

            if systemctl is-active --quiet ${{ env.SERVICE_NAME }}; then
              echo "BOT: RUNNING"
            else
              echo "BOT: FAILED"
              journalctl -u ${{ env.SERVICE_NAME }} --no-pager -n 15
              exit 1
            fi

            # ── Setup status cron ──
            if [ -n "${SERVER_GH_PAT:-}" ]; then
              echo "export GH_PAT=${SERVER_GH_PAT}" > "$BOT_DIR/.gh_pat"
              chmod 600 "$BOT_DIR/.gh_pat"
            fi

            CRON_CMD="cd $BOT_DIR && . $BOT_DIR/.gh_pat 2>/dev/null; bash server_cron.sh >> /var/log/tradovate-cron.log 2>&1"
            if ! crontab -l 2>/dev/null | grep -q "server_cron.sh"; then
              (crontab -l 2>/dev/null; echo "*/5 * * * * $CRON_CMD") | crontab -
              echo "Status cron installed."
            else
              echo "Status cron already exists."
            fi
        env:
          SERVER_GH_PAT: ${{ secrets.SERVER_GH_PAT }}

      # Fallback: webhook if no SSH host configured
      - name: Trigger server webhook (fallback)
        if: vars.SERVER_HOST == '' && vars.DEPLOY_WEBHOOK_URL != ''
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"ref":"${{ env.DEPLOY_BRANCH }}","commit":"${{ github.sha }}","source":"${{ github.ref_name }}","actor":"${{ github.actor }}"}' \
            "${{ vars.DEPLOY_WEBHOOK_URL }}" \
            --max-time 10 || echo "Webhook sent"

      - name: Deploy summary
        if: always()
        run: |
          echo "## Auto-merge & Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** \`${{ env.DEPLOY_BRANCH }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ vars.SERVER_HOST }}" != "" ]; then
            echo "Merged and deployed via SSH." >> $GITHUB_STEP_SUMMARY
          else
            echo "Merged. No server configured for deploy." >> $GITHUB_STEP_SUMMARY
          fi
