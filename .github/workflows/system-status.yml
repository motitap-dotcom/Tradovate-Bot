name: System Status Check

# Runs every 30 min, on push to key branches, or manually via workflow_dispatch
on:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: [main, 'claude/**']
    paths:
      - '.github/workflows/system-status.yml'
      - 'system_status.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-status:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      # ── Step A: Check if SSH is configured ──
      - name: Check SSH availability
        id: ssh_check
        env:
          SSH_HOST: ${{ secrets.VPS_HOST }}
        run: |
          if [ -n "$SSH_HOST" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "SSH not configured — skipping server check"
          fi

      # ── Step B: Query everything from server via SSH ──
      # The bot on the server has a valid token. We run API queries
      # FROM the server and return the results — no need to pass
      # tokens or passwords through GitHub.
      - name: Get full status from server via SSH
        id: ssh_status
        if: steps.ssh_check.outputs.available == 'true'
        continue-on-error: true
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key

          SSH_PORT="${VPS_PORT:-22}"
          SSH_CMD="ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i ~/.ssh/vps_key -p $SSH_PORT ${VPS_USER}@${VPS_HOST}"

          echo "Connecting to ${VPS_USER}@${VPS_HOST}:${SSH_PORT}..."

          # Run everything on the server: maintain, read token, query API, return JSON
          SSH_RESULT=$($SSH_CMD 'bash -s' 2>/tmp/ssh_stderr.txt << 'REMOTESCRIPT' || true
          cd /root/tradovate-bot 2>/dev/null || cd /root/Tradovate-Bot 2>/dev/null || { echo '{"error":"DIR_NOT_FOUND"}'; exit 0; }

          # ── 0. Maintenance: pull latest code & fix expired tokens ──
          git pull origin main --ff-only 2>/dev/null || true

          # Check if token is expired > 2 hours — if so, delete it and restart bot
          TOKEN_EXPIRY_CHECK=$(python3 -c "
          import json
          from datetime import datetime, timezone
          try:
              d = json.load(open('.tradovate_token.json'))
              exp = datetime.fromisoformat(d['expirationTime'])
              age = (datetime.now(timezone.utc) - exp).total_seconds()
              print('expired' if age > 7200 else 'ok')
          except:
              print('missing')
          " 2>/dev/null || echo "missing")

          if [ "$TOKEN_EXPIRY_CHECK" != "ok" ]; then
              # Token is stale — remove it and restart bot so it re-authenticates
              rm -f .tradovate_token.json
              systemctl restart tradovate-bot 2>/dev/null || true
              # Wait for bot to authenticate (up to 60s)
              for i in $(seq 1 12); do
                  sleep 5
                  if [ -f .tradovate_token.json ]; then
                      NEW_EXP=$(python3 -c "
          import json
          from datetime import datetime, timezone
          try:
              d = json.load(open('.tradovate_token.json'))
              exp = datetime.fromisoformat(d['expirationTime'])
              print('ok' if (exp - datetime.now(timezone.utc)).total_seconds() > 0 else 'expired')
          except:
              print('missing')
          " 2>/dev/null || echo "missing")
                      if [ "$NEW_EXP" = "ok" ]; then
                          break
                      fi
                  fi
              done
          fi

          # ── 1. Server health ──
          BOT_ACTIVE=false
          BOT_PID=""
          if systemctl is-active --quiet tradovate-bot 2>/dev/null; then
              BOT_ACTIVE=true
              BOT_PID=$(systemctl show tradovate-bot --property=MainPID --value 2>/dev/null)
          fi
          UPTIME=$(systemctl show tradovate-bot --property=ActiveEnterTimestamp --value 2>/dev/null || echo "")
          DISK=$(df -h / 2>/dev/null | tail -1 | awk '{print $5}' || echo "?")
          MEM=$(free -m 2>/dev/null | awk '/^Mem:/{printf "%dMB/%dMB (%.0f%%)", $3, $2, $3/$2*100}' || echo "?")

          # ── 2. Token: read from file, try both DEMO and LIVE endpoints ──
          TOKEN=$(python3 -c "import json; print(json.load(open('.tradovate_token.json')).get('accessToken',''))" 2>/dev/null || echo "")
          TOKEN_EXPIRY=$(python3 -c "import json; print(json.load(open('.tradovate_token.json')).get('expirationTime',''))" 2>/dev/null || echo "")

          AUTH_OK=false
          API_URL=""
          ACCOUNT_JSON="{}"
          BALANCE_JSON="{}"
          POSITIONS_JSON="[]"
          ORDERS_JSON="[]"

          if [ -n "$TOKEN" ]; then
              # Try token on both DEMO and LIVE endpoints
              for TRY_URL in "https://demo.tradovateapi.com/v1" "https://live.tradovateapi.com/v1"; do
                  HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $TOKEN" "$TRY_URL/account/list" 2>/dev/null)
                  if [ "$HTTP_CODE" = "200" ]; then
                      API_URL="$TRY_URL"
                      break
                  fi
              done

              # If token expired, try renewal on both endpoints
              if [ -z "$API_URL" ]; then
                  for TRY_URL in "https://demo.tradovateapi.com/v1" "https://live.tradovateapi.com/v1"; do
                      RENEWED=$(curl -s -X POST "$TRY_URL/auth/renewaccesstoken" -H "Content-Type: application/json" -H "Authorization: Bearer $TOKEN" -d "{}" 2>/dev/null)
                      NEW_TOKEN=$(echo "$RENEWED" | python3 -c "import sys,json; print(json.load(sys.stdin).get('accessToken',''))" 2>/dev/null || echo "")
                      if [ -n "$NEW_TOKEN" ]; then
                          TOKEN="$NEW_TOKEN"
                          API_URL="$TRY_URL"
                          echo "$RENEWED" | python3 -c "import sys,json; d=json.load(sys.stdin); json.dump(d,open('.tradovate_token.json','w'),indent=2)" 2>/dev/null
                          TOKEN_EXPIRY=$(echo "$RENEWED" | python3 -c "import sys,json; print(json.load(sys.stdin).get('expirationTime',''))" 2>/dev/null || echo "")
                          break
                      fi
                  done
              fi

              # If still no API_URL, try fresh auth from server using bot code
              if [ -z "$API_URL" ] && [ -f .env ] && [ -f bot.py ]; then
                  # Source .env and try to authenticate fresh
                  set -a
                  source .env 2>/dev/null
                  set +a
                  FRESH=$(python3 -c "
          import sys; sys.path.insert(0, '.')
          from tradovate_api import TradovateClient
          c = TradovateClient()
          c.authenticate()
          if c.access_token:
              print(c.access_token)
          " 2>/dev/null || echo "")
                  if [ -n "$FRESH" ]; then
                      TOKEN="$FRESH"
                      API_URL="https://demo.tradovateapi.com/v1"
                      TOKEN_EXPIRY="fresh"
                  fi
              fi

              # Query everything using the working token
              if [ -n "$API_URL" ]; then
                  ACCOUNT_JSON=$(curl -s -H "Authorization: Bearer $TOKEN" "$API_URL/account/list" 2>/dev/null || echo "[]")
              fi
              CHECK=$(echo "$ACCOUNT_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print('ok' if isinstance(d,list) and len(d)>0 else 'fail')" 2>/dev/null || echo "fail")

              if [ "$CHECK" = "ok" ]; then
                  AUTH_OK=true
                  BALANCE_JSON=$(curl -s -H "Authorization: Bearer $TOKEN" "$API_URL/cashBalance/getcashbalancesnapshot?accountId=39996695" 2>/dev/null || echo "{}")
                  POSITIONS_JSON=$(curl -s -H "Authorization: Bearer $TOKEN" "$API_URL/position/list" 2>/dev/null || echo "[]")
                  ORDERS_JSON=$(curl -s -H "Authorization: Bearer $TOKEN" "$API_URL/order/list" 2>/dev/null || echo "[]")
              fi
          fi

          # ── Output everything as single JSON ──
          # Write data to temp files to avoid shell quoting issues with JSON
          echo "$ACCOUNT_JSON" > /tmp/_accounts.json 2>/dev/null
          echo "$BALANCE_JSON" > /tmp/_balance.json 2>/dev/null
          echo "$POSITIONS_JSON" > /tmp/_positions.json 2>/dev/null
          echo "$ORDERS_JSON" > /tmp/_orders.json 2>/dev/null
          python3 -c "
          import json
          def load(path, default):
              try:
                  with open(path) as f:
                      return json.load(f)
              except:
                  return default
          server = {'bot_active': '$BOT_ACTIVE' == 'true', 'bot_pid': '$BOT_PID', 'uptime_since': '$UPTIME', 'disk': '$DISK', 'memory': '$MEM'}
          accounts = load('/tmp/_accounts.json', [])
          balance = load('/tmp/_balance.json', {})
          positions = load('/tmp/_positions.json', [])
          orders = load('/tmp/_orders.json', [])
          print(json.dumps({'server': server, 'auth_ok': '$AUTH_OK' == 'true', 'token_expiry': '$TOKEN_EXPIRY', 'accounts': accounts if isinstance(accounts, list) else [], 'balance': balance if isinstance(balance, dict) else {}, 'positions': positions if isinstance(positions, list) else [], 'orders': orders if isinstance(orders, list) else []}))
          " 2>/dev/null || echo '{"error":"python_failed"}'
          rm -f /tmp/_accounts.json /tmp/_balance.json /tmp/_positions.json /tmp/_orders.json
          REMOTESCRIPT
          )

          SSH_ERR=$(cat /tmp/ssh_stderr.txt 2>/dev/null || echo "")
          echo "SSH stdout length: ${#SSH_RESULT}"
          echo "SSH stderr: ${SSH_ERR}"
          echo "$SSH_RESULT" > /tmp/ssh_output.txt
          rm -f ~/.ssh/vps_key

      # ── Step C: Build system_status.json ──
      - name: Build status JSON
        env:
          SSH_OK: ${{ steps.ssh_status.outcome == 'success' && 'true' || 'false' }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys, re
          from datetime import datetime, timezone

          import requests

          DEMO_URL = "https://demo.tradovateapi.com/v1"
          LIVE_URL = "https://live.tradovateapi.com/v1"
          ACCOUNT_ID = 39996695

          status = {
              "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "api_reachable": False,
              "authenticated": False,
              "auth_method": None,
              "account": {},
              "balance": {},
              "positions": [],
              "orders": [],
              "server": None,
              "errors": [],
          }

          # ── 1. API Connectivity ──
          print("=== 1. API Connectivity ===")
          for label, url in [("Demo", DEMO_URL), ("Live", LIVE_URL)]:
              try:
                  r = requests.post(f"{url}/auth/accesstokenrequest",
                                    json={"name": "test"}, timeout=10)
                  print(f"  {label}: {r.status_code} OK")
                  status["api_reachable"] = True
              except Exception as e:
                  print(f"  {label}: FAIL - {e}")

          # ── 2. Parse SSH output (all data from server) ──
          ssh_ok = os.environ.get("SSH_OK", "false") == "true"
          ssh_data = None
          try:
              with open("/tmp/ssh_output.txt") as f:
                  raw = f.read().strip()
                  if raw:
                      ssh_data = json.loads(raw)
          except (FileNotFoundError, json.JSONDecodeError) as e:
              print(f"  SSH output parse error: {e}")

          if ssh_ok and ssh_data and "error" not in ssh_data:
              print("\n=== 2. Server Data (via SSH) ===")

              # Server health
              status["server"] = ssh_data.get("server")
              srv = status["server"] or {}
              print(f"  Bot active: {srv.get('bot_active')}")
              print(f"  Memory: {srv.get('memory')}")
              print(f"  Disk: {srv.get('disk')}")

              # Auth & account data
              if ssh_data.get("auth_ok"):
                  status["authenticated"] = True
                  status["auth_method"] = "server_ssh"
                  print(f"  Auth: OK (token expires {ssh_data.get('token_expiry', '?')[:19]})")

                  # Account
                  accounts = ssh_data.get("accounts", [])
                  for a in accounts:
                      if a.get("id") == ACCOUNT_ID or len(accounts) == 1:
                          status["account"] = {
                              "name": a.get("name"), "id": a.get("id"), "active": a.get("active"),
                          }
                          print(f"  Account: {a.get('name')} (ID: {a.get('id')})")

                  # Balance
                  bal = ssh_data.get("balance", {})
                  if bal:
                      status["balance"] = {
                          "realizedPnl": bal.get("realizedPnl"),
                          "unrealizedPnl": bal.get("unrealizedPnl"),
                          "totalCashValue": bal.get("totalCashValue"),
                          "initialMargin": bal.get("initialMargin"),
                      }
                      print(f"  Balance: ${bal.get('totalCashValue', 'N/A')}")

                  # Positions
                  positions = ssh_data.get("positions", [])
                  open_pos = [p for p in positions if p.get("netPos", 0) != 0]
                  status["positions"] = [
                      {"contractId": p.get("contractId"), "netPos": p.get("netPos"),
                       "netPrice": p.get("netPrice")} for p in open_pos
                  ]
                  print(f"  Open positions: {len(open_pos)}")

                  # Orders
                  orders = ssh_data.get("orders", [])
                  active = [o for o in orders if o.get("ordStatus") in ("Working", "Accepted")]
                  status["orders"] = [
                      {"id": o.get("id"), "action": o.get("action"),
                       "qty": o.get("orderQty"), "status": o.get("ordStatus")} for o in active
                  ]
                  print(f"  Active orders: {len(active)}")
              else:
                  token_exp = ssh_data.get("token_expiry", "unknown")
                  print(f"  Auth: token expired or missing (expiry: {token_exp})")
                  status["errors"].append(f"Server token expired (expiry: {token_exp}) — bot may need restart")
          elif ssh_data and "error" in ssh_data:
              print(f"\n  SSH error: {ssh_data['error']}")
              status["errors"].append(f"SSH: {ssh_data['error']}")
          else:
              if not ssh_ok:
                  status["errors"].append("SSH connection failed")
              else:
                  status["errors"].append("No data from server")

          # ── 3. Write results ──
          print("\n=== Summary ===")
          print(f"  API: {'OK' if status['api_reachable'] else 'DOWN'}")
          print(f"  Auth: {status['auth_method'] or 'none'}")
          print(f"  Server: {'connected' if status['server'] else 'no data'}")
          print(f"  Errors: {len(status['errors'])}")

          with open("system_status.json", "w") as f:
              json.dump(status, f, indent=2)
          print("\nWrote system_status.json")
          PYEOF

      - name: Commit and push status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add system_status.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            AUTH=$(python3 -c "import json; d=json.load(open('system_status.json')); print(d.get('auth_method','none'))")
            API=$(python3 -c "import json; d=json.load(open('system_status.json')); print('ok' if d['api_reachable'] else 'down')")
            git commit -m "status: $(date -u '+%Y-%m-%d %H:%M UTC') | api=$API auth=$AUTH"
            git push origin main
            echo "Pushed to main"
          fi

      - name: Generate summary
        if: always()
        run: |
          if [ ! -f system_status.json ]; then
            echo "Status check failed." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "## System Status" >> $GITHUB_STEP_SUMMARY
          echo "**$(date -u '+%Y-%m-%d %H:%M UTC')**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          python3 << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import json
          d = json.load(open("system_status.json"))

          print("| Check | Status |")
          print("|-------|--------|")
          print(f"| API | {'OK' if d['api_reachable'] else 'DOWN'} |")
          print(f"| Auth | {d.get('auth_method') or 'none'} |")

          bal = d.get("balance", {})
          if bal:
              print(f"| Balance | ${bal.get('totalCashValue', 'N/A')} |")
              print(f"| Realized P&L | ${bal.get('realizedPnl', 'N/A')} |")
              print(f"| Unrealized P&L | ${bal.get('unrealizedPnl', 'N/A')} |")

          print(f"| Positions | {len(d.get('positions', []))} |")
          print(f"| Orders | {len(d.get('orders', []))} |")

          srv = d.get("server")
          if srv:
              print(f"| Bot Active | {srv.get('bot_active', '?')} |")
              print(f"| Memory | {srv.get('memory', '?')} |")
              print(f"| Disk | {srv.get('disk', '?')} |")

          errs = d.get("errors", [])
          if errs:
              print("")
              print("### Errors")
              for e in errs:
                  print(f"- {e}")

          pos = d.get("positions", [])
          if pos:
              print("")
              print("### Open Positions")
              print("| Contract | Qty | Price |")
              print("|----------|-----|-------|")
              for p in pos:
                  print(f"| {p['contractId']} | {p['netPos']} | {p.get('netPrice','?')} |")
          PYEOF
