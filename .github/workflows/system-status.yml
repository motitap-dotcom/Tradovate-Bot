name: System Status Check

# Runs every 30 min, on push to key branches, or manually via workflow_dispatch
on:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: [main, 'claude/**']
  workflow_dispatch:

permissions:
  contents: write

env:
  BOT_DIR: /root/tradovate-bot

jobs:
  check-status:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      # ── Step A: Check if SSH is configured ──
      - name: Check SSH availability
        id: ssh_check
        env:
          HOST_VAR: ${{ vars.SERVER_HOST }}
          HOST_SEC: ${{ secrets.SERVER_HOST }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_KEY: ${{ secrets.VPS_KEY }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          # Try all common naming patterns
          SSH_HOST="${HOST_VAR:-${HOST_SEC:-${VPS_HOST:-${SERVER_IP:-}}}}"
          SSH_KEY_FINAL="${SSH_KEY:-${SSH_PRIVATE_KEY:-${VPS_KEY:-${VPS_SSH_KEY:-}}}}"

          echo "ssh_host=$SSH_HOST" >> $GITHUB_OUTPUT

          if [ -n "$SSH_HOST" ] && [ -n "$SSH_KEY_FINAL" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "SSH configured: host found"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "SSH not configured — skipping server check"
            [ -z "$SSH_HOST" ] && echo "  Missing: SERVER_HOST"
            [ -z "$SSH_KEY_FINAL" ] && echo "  Missing: SERVER_SSH_KEY"
          fi

      # ── Step B: Get token + server status via SSH (direct ssh, not action) ──
      - name: Get server status via SSH
        id: ssh_status
        if: steps.ssh_check.outputs.available == 'true'
        continue-on-error: true
        env:
          SSH_HOST: ${{ steps.ssh_check.outputs.ssh_host }}
          SSH_USER: ${{ secrets.VPS_USER || vars.SERVER_USER || secrets.SERVER_USER || 'root' }}
          SSH_KEY_CONTENT: ${{ secrets.VPS_SSH_KEY || secrets.SERVER_SSH_KEY || secrets.SSH_PRIVATE_KEY || secrets.VPS_KEY }}
          SSH_PASS: ${{ secrets.VPS_PASSWORD }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY_CONTENT" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/vps_key -o ConnectTimeout=30 -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" 'bash -s' > /tmp/ssh_output.txt 2>&1 <<'REMOTE_EOF'
          BOT_DIR=""
          for d in /root/tradovate-bot /root/Tradovate-Bot \
                   /home/*/tradovate-bot /home/*/Tradovate-Bot \
                   /opt/tradovate-bot ~/tradovate-bot ~/Tradovate-Bot; do
            [ -d "$d" ] && BOT_DIR="$d" && break
          done
          # Also try: find systemd service WorkingDirectory
          if [ -z "$BOT_DIR" ]; then
            SVC_DIR=$(systemctl show tradovate-bot --property=WorkingDirectory --value 2>/dev/null)
            [ -n "$SVC_DIR" ] && [ -d "$SVC_DIR" ] && BOT_DIR="$SVC_DIR"
          fi
          # Also try: find the process cwd
          if [ -z "$BOT_DIR" ]; then
            BOT_PID_TMP=$(systemctl show tradovate-bot --property=MainPID --value 2>/dev/null)
            [ -n "$BOT_PID_TMP" ] && [ "$BOT_PID_TMP" != "0" ] && \
              BOT_DIR=$(readlink -f "/proc/$BOT_PID_TMP/cwd" 2>/dev/null)
          fi

          echo "==TOKEN_START=="
          if [ -n "$BOT_DIR" ] && [ -f "$BOT_DIR/.tradovate_token.json" ]; then
            cat "$BOT_DIR/.tradovate_token.json"
          else
            echo "{}"
          fi
          echo "==TOKEN_END=="

          echo "==SERVER_START=="
          BOT_ACTIVE="false"
          BOT_PID=""
          if systemctl is-active --quiet tradovate-bot 2>/dev/null; then
            BOT_ACTIVE="true"
            BOT_PID=$(systemctl show tradovate-bot --property=MainPID --value 2>/dev/null)
          fi
          UPTIME=$(systemctl show tradovate-bot --property=ActiveEnterTimestamp --value 2>/dev/null || echo "")
          DISK=$(df -h / 2>/dev/null | tail -1 | awk '{print $5}' || echo "?")
          MEM=$(free -m 2>/dev/null | awk '/^Mem:/{printf "%dMB/%dMB (%.0f%%)", $3, $2, $3/$2*100}' || echo "?")
          LAST_LOG=$(journalctl -u tradovate-bot --no-pager -n 5 2>/dev/null | tail -5 || echo "no logs")
          LIVE_STATUS="{}"
          [ -n "$BOT_DIR" ] && [ -f "$BOT_DIR/live_status.json" ] && LIVE_STATUS=$(cat "$BOT_DIR/live_status.json" 2>/dev/null || echo "{}")
          BOT_LOG_TAIL=""
          [ -n "$BOT_DIR" ] && [ -f "$BOT_DIR/bot.log" ] && BOT_LOG_TAIL=$(tail -15 "$BOT_DIR/bot.log" 2>/dev/null || echo "")
          GIT_COMMIT=""
          [ -n "$BOT_DIR" ] && GIT_COMMIT=$(cd "$BOT_DIR" && git log -1 --format="%h %s" 2>/dev/null || echo "?")

          python3 -c "
          import json
          print(json.dumps({
            'bot_dir': '$BOT_DIR' or 'NOT_FOUND',
            'bot_active': $BOT_ACTIVE,
            'bot_pid': '$BOT_PID',
            'uptime_since': '$UPTIME',
            'disk': '$DISK',
            'memory': '$MEM',
            'hostname': '$(hostname)',
            'last_log': '''$LAST_LOG'''.strip(),
            'bot_log_tail': '''$BOT_LOG_TAIL'''.strip()[:500],
            'live_status': $LIVE_STATUS,
            'git_commit': '$GIT_COMMIT',
          }))
          " 2>/dev/null || echo "{\"bot_dir\":\"$BOT_DIR\",\"bot_active\":$BOT_ACTIVE,\"hostname\":\"$(hostname)\"}"
          echo "==SERVER_END=="

          echo "==TRADING_START=="
          if [ -n "$BOT_DIR" ]; then
            python3 - "$BOT_DIR" <<'PYEOF'
          import json, os, sys
          from datetime import datetime, timezone
          bot_dir = sys.argv[1]
          result = {"live_status":{},"token_status":"missing","token_expiry":"","recent_signals":[],"recent_trades":[],"bot_log_tail":[],"journal_summary":{},"trading_active":False,"websocket_connected":False,"errors_in_log":[]}
          ls_path = os.path.join(bot_dir, "live_status.json")
          if os.path.exists(ls_path):
              try:
                  with open(ls_path) as f: result["live_status"] = json.load(f)
              except: pass
          tk_path = os.path.join(bot_dir, ".tradovate_token.json")
          if os.path.exists(tk_path):
              try:
                  with open(tk_path) as f: td = json.load(f)
                  exp = td.get("expirationTime","")
                  result["token_expiry"] = exp
                  if exp:
                      exp_dt = datetime.fromisoformat(exp.replace("Z","+00:00"))
                      remaining = (exp_dt - datetime.now(timezone.utc)).total_seconds()
                      result["token_status"] = "valid" if remaining > 0 else "expired"
                  else: result["token_status"] = "no_expiry"
              except: result["token_status"] = "error"
          log_path = os.path.join(bot_dir, "bot.log")
          if os.path.exists(log_path):
              try:
                  with open(log_path,"rb") as f:
                      f.seek(0,2); size=f.tell(); f.seek(max(0,size-50000))
                      lines = f.read().decode("utf-8",errors="replace").strip().split("\n")
                  result["bot_log_tail"] = lines[-30:]
                  for line in lines[-200:]:
                      if "SIGNAL:" in line: result["recent_signals"].append(line.strip()[-200:])
                      if "ERROR" in line or "Traceback" in line: result["errors_in_log"].append(line.strip()[-200:])
                      if "Status |" in line: result["trading_active"] = True
                  result["recent_signals"] = result["recent_signals"][-10:]
                  result["errors_in_log"] = result["errors_in_log"][-10:]
              except Exception as e: result["errors_in_log"].append(str(e))
          tj_path = os.path.join(bot_dir, "trade_journal.json")
          if os.path.exists(tj_path):
              try:
                  with open(tj_path) as f: tj = json.load(f)
                  result["journal_summary"] = tj.get("summary",{})
              except: pass
          print(json.dumps(result))
          PYEOF
          else
            echo '{"error":"no bot dir"}'
          fi
          echo "==TRADING_END=="
          REMOTE_EOF

          SSH_EXIT=$?
          echo "SSH exit code: $SSH_EXIT"

          if [ -f /tmp/ssh_output.txt ] && [ -s /tmp/ssh_output.txt ]; then
            echo "SSH output: $(wc -c < /tmp/ssh_output.txt) bytes"
            {
              echo 'stdout<<SSHEOF'
              cat /tmp/ssh_output.txt
              echo 'SSHEOF'
            } >> $GITHUB_OUTPUT
          else
            echo "No SSH output captured"
            echo "stdout=" >> $GITHUB_OUTPUT
          fi
          rm -f ~/.ssh/vps_key

      # ── Debug: Show SSH step outcome ──
      - name: SSH debug info
        if: always()
        env:
          HAS_SECRET: ${{ secrets.SERVER_HOST != '' }}
          HAS_VAR: ${{ vars.SERVER_HOST != '' }}
          HAS_KEY: ${{ secrets.SERVER_SSH_KEY != '' }}
        run: |
          echo "SSH check available: ${{ steps.ssh_check.outputs.available }}"
          echo "SSH status outcome: ${{ steps.ssh_status.outcome }}"
          echo "Has SERVER_HOST secret: $HAS_SECRET"
          echo "Has SERVER_HOST var: $HAS_VAR"
          echo "Has SSH_KEY secret: $HAS_KEY"
          echo "SSH stdout lines: $(echo '${{ steps.ssh_status.outputs.stdout }}' | wc -l)"

      # ── Step C: Check system status (API + optional SSH token) ──
      - name: Check system status
        env:
          TRADOVATE_ACCESS_TOKEN: ${{ secrets.TRADOVATE_ACCESS_TOKEN }}
          TRADOVATE_USERNAME: ${{ secrets.TRADOVATE_USERNAME }}
          TRADOVATE_PASSWORD: ${{ secrets.TRADOVATE_PASSWORD }}
          SSH_OUTPUT: ${{ steps.ssh_status.outputs.stdout || '' }}
          SSH_OK: ${{ steps.ssh_status.outcome == 'success' && 'true' || 'false' }}
          SSH_AVAILABLE: ${{ steps.ssh_check.outputs.available }}
          HAS_SERVER_HOST: ${{ secrets.SERVER_HOST != '' || secrets.VPS_HOST != '' }}
          HAS_SSH_KEY: ${{ secrets.SERVER_SSH_KEY != '' || secrets.VPS_SSH_KEY != '' }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys, re, base64, hashlib, hmac, uuid
          from datetime import datetime, timezone

          import requests

          DEMO_URL = "https://demo.tradovateapi.com/v1"
          LIVE_URL = "https://live.tradovateapi.com/v1"
          ACCOUNT_ID = 39996695

          status = {
              "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "api_reachable": False,
              "authenticated": False,
              "auth_method": None,
              "account": {},
              "balance": {},
              "positions": [],
              "orders": [],
              "server": None,
              "trading_activity": None,
              "errors": [],
              "debug": {
                  "ssh_available": os.environ.get("SSH_AVAILABLE", "?"),
                  "ssh_ok": os.environ.get("SSH_OK", "?"),
                  "ssh_output_len": len(os.environ.get("SSH_OUTPUT", "")),
                  "has_server_host": os.environ.get("HAS_SERVER_HOST", "?"),
                  "has_ssh_key": os.environ.get("HAS_SSH_KEY", "?"),
                  # Credential diagnostics (no values exposed)
                  "has_username": bool(os.environ.get("TRADOVATE_USERNAME", "").strip()),
                  "username_len": len(os.environ.get("TRADOVATE_USERNAME", "").strip()),
                  "has_password": bool(os.environ.get("TRADOVATE_PASSWORD", "").strip()),
                  "password_len": len(os.environ.get("TRADOVATE_PASSWORD", "").strip()),
                  "has_access_token": bool(os.environ.get("TRADOVATE_ACCESS_TOKEN", "").strip()),
                  "username_first3": os.environ.get("TRADOVATE_USERNAME", "")[:3] or "EMPTY",
              },
          }

          # ── 1. API Connectivity ──
          print("=== 1. API Connectivity ===")
          for label, url in [("Demo", DEMO_URL), ("Live", LIVE_URL)]:
              try:
                  r = requests.post(f"{url}/auth/accesstokenrequest",
                                    json={"name": "test"}, timeout=10)
                  print(f"  {label}: {r.status_code} OK")
                  status["api_reachable"] = True
              except Exception as e:
                  print(f"  {label}: FAIL - {e}")
                  status["errors"].append(f"{label} API unreachable: {e}")

          # ── 2. Parse SSH output (token + server info) ──
          ssh_output = os.environ.get("SSH_OUTPUT", "")
          ssh_ok = os.environ.get("SSH_OK", "false") == "true"
          ssh_token = ""

          if ssh_ok and ssh_output:
              print("\n=== 2. Server SSH Data ===")
              # Extract token from SSH output
              token_match = re.search(r"==TOKEN_START==\s*(.*?)\s*==TOKEN_END==", ssh_output, re.DOTALL)
              if token_match:
                  try:
                      token_data = json.loads(token_match.group(1).strip())
                      ssh_token = token_data.get("accessToken", "")
                      if ssh_token:
                          print(f"  Got token from server (expires: {token_data.get('expirationTime', '?')[:19]})")
                  except Exception:
                      print("  Could not parse token from server")

              # Extract server status
              server_match = re.search(r"==SERVER_START==\s*([\s\S]*?)\s*==SERVER_END==", ssh_output)
              if server_match:
                  server_lines = server_match.group(1).strip().split("\n")
                  for line in reversed(server_lines):
                      line = line.strip()
                      if line.startswith("{"):
                          try:
                              status["server"] = json.loads(line)
                              print(f"  Server: bot_active={status['server'].get('bot_active')}")
                              print(f"  Memory: {status['server'].get('memory')}")
                              print(f"  Disk: {status['server'].get('disk')}")
                              if status["server"].get("bot_log_tail"):
                                  print(f"  Bot log tail:")
                                  for log_line in status["server"]["bot_log_tail"].split("\n")[-5:]:
                                      print(f"    {log_line}")
                          except Exception:
                              pass
                          break
              # Extract trading activity data
              trading_match = re.search(r"==TRADING_START==\s*([\s\S]*?)\s*==TRADING_END==", ssh_output)
              if trading_match:
                  trading_lines = trading_match.group(1).strip().split("\n")
                  for line in reversed(trading_lines):
                      line = line.strip()
                      if line.startswith("{"):
                          try:
                              status["trading_activity"] = json.loads(line)
                              ta = status["trading_activity"]
                              print(f"  Token: {ta.get('token_status')} (expires: {ta.get('token_expiry', '?')[:19]})")
                              print(f"  Trading active: {ta.get('trading_active')}")
                              print(f"  Signals: {len(ta.get('recent_signals', []))}")
                              print(f"  Trades: {len(ta.get('recent_trades', []))}")
                              print(f"  WS connected: {ta.get('websocket_connected')}")
                              print(f"  Errors in log: {len(ta.get('errors_in_log', []))}")
                          except Exception:
                              pass
                          break

          else:
              if os.environ.get("SSH_OK") == "false" and os.environ.get("SSH_OUTPUT"):
                  print("\n=== 2. Server SSH ===")
                  print("  SSH connection failed")
                  status["errors"].append("SSH connection to server failed")

          # ── 3. Authentication ──
          print("\n=== 3. Authentication ===")
          token = ""

          # Priority 1: Token from SSH (server's live token)
          if ssh_token:
              print("  Trying server token...")
              try:
                  r = requests.get(f"{DEMO_URL}/account/list",
                                   headers={"Authorization": f"Bearer {ssh_token}"}, timeout=10)
                  if r.status_code == 200:
                      print("  Server token valid!")
                      token = ssh_token
                      status["authenticated"] = True
                      status["auth_method"] = "server_token"
                  else:
                      print(f"  Server token expired: {r.status_code}")
              except Exception as e:
                  print(f"  Server token error: {e}")

          # Priority 2: TRADOVATE_ACCESS_TOKEN secret
          if not token:
              env_token = os.environ.get("TRADOVATE_ACCESS_TOKEN", "").strip()
              if env_token:
                  print("  Trying saved token secret...")
                  try:
                      r = requests.get(f"{DEMO_URL}/account/list",
                                       headers={"Authorization": f"Bearer {env_token}"}, timeout=10)
                      if r.status_code == 200:
                          print("  Saved token valid!")
                          token = env_token
                          status["authenticated"] = True
                          status["auth_method"] = "saved_token"
                      else:
                          print(f"  Saved token expired: {r.status_code}")
                  except Exception as e:
                      print(f"  Saved token error: {e}")

          # Priority 3: Web-style auth (username + password)
          if not token:
              username = os.environ.get("TRADOVATE_USERNAME", "").strip()
              password = os.environ.get("TRADOVATE_PASSWORD", "").strip()

              if username and password:
                  print("  Trying web-style auth...")
                  offset = len(username) % len(password)
                  rearranged = password[offset:] + password[:offset]
                  reversed_pw = rearranged[::-1]
                  encrypted_pw = base64.b64encode(reversed_pw.encode()).decode()

                  # Use a FIXED device ID to avoid Tradovate treating each
                  # workflow run as a "new device" (which triggers CAPTCHA/rate-limit)
                  device_id = "gh-status-tradovate-bot-monitor"
                  hmac_key = "1259-11e7-485a-aeae-9b6016579351"
                  payload = {
                      "name": username, "password": encrypted_pw,
                      "appId": "tradovate_trader(web)", "appVersion": "3.260220.0",
                      "deviceId": device_id, "cid": 8, "sec": "", "chl": "", "organization": "",
                  }
                  fields = ["chl", "deviceId", "name", "password", "appId"]
                  message = "".join(str(payload.get(f, "")) for f in fields)
                  payload["sec"] = hmac.new(
                      hmac_key.encode(), message.encode(), hashlib.sha256
                  ).hexdigest()

                  # Try both live and demo endpoints (some prop firms only work on one)
                  auth_urls = [
                      ("Live", f"{LIVE_URL}/auth/accesstokenrequest"),
                      ("Demo", f"{DEMO_URL}/auth/accesstokenrequest"),
                  ]
                  for label, auth_url in auth_urls:
                      if token:
                          break
                      try:
                          print(f"  Trying {label} endpoint...")
                          r = requests.post(auth_url, json=payload, timeout=30)
                          data = r.json()
                          if "accessToken" in data:
                              token = data["accessToken"]
                              print(f"  Auth success via {label}! userId={data.get('userId')}")
                              status["authenticated"] = True
                              status["auth_method"] = f"web_auth_{label.lower()}"
                          elif "p-ticket" in data:
                              needs_captcha = data.get("p-captcha", False)
                              p_time = data.get("p-time", 15)
                              print(f"  {label}: Credentials valid! CAPTCHA={needs_captcha}, wait={p_time}s")
                              if not needs_captcha:
                                  # No CAPTCHA — wait and verify with p-ticket
                                  import time as _time
                                  print(f"  Waiting {p_time+1}s for device verification...")
                                  _time.sleep(p_time + 1)
                                  verify_payload = dict(payload)
                                  verify_payload["p-ticket"] = data["p-ticket"]
                                  r2 = requests.post(auth_url, json=verify_payload, timeout=30)
                                  d2 = r2.json()
                                  if "accessToken" in d2:
                                      token = d2["accessToken"]
                                      print(f"  Device verified via {label}! userId={d2.get('userId')}")
                                      status["authenticated"] = True
                                      status["auth_method"] = f"web_auth_{label.lower()}_verified"
                                  else:
                                      print(f"  {label} verification: {d2.get('errorText', str(d2)[:100])}")
                              else:
                                  status["auth_method"] = "captcha_needed"
                                  status["errors"].append(f"{label}: CAPTCHA required — use SSH token from server")
                          else:
                              err = data.get("errorText", str(data))
                              print(f"  {label} auth: {err}")
                              # Only add as error if both endpoints fail
                              if label == "Demo":
                                  if "Incorrect" in err and not ssh_ok:
                                      status["errors"].append(
                                          f"Auth from GH Actions: {err} "
                                          "(expected — GH runners need CAPTCHA. "
                                          "Configure SERVER_HOST + SERVER_SSH_KEY to check bot on server)"
                                      )
                                  else:
                                      status["errors"].append(f"Auth: {err}")
                      except Exception as e:
                          print(f"  {label} auth error: {e}")
                          if label == "Demo":
                              status["errors"].append(f"Auth error: {e}")
                  # Priority 3b: Try with plain password (no encryption)
                  # Some prop firm accounts may not use the web-style encryption
                  if not token:
                      print("  Web-style auth failed. Trying plain password...")
                      plain_payload = dict(payload)
                      plain_payload["password"] = password  # plain text, not encrypted
                      # Recompute HMAC with plain password
                      plain_message = "".join(str(plain_payload.get(f, "")) for f in fields)
                      plain_payload["sec"] = hmac.new(
                          hmac_key.encode(), plain_message.encode(), hashlib.sha256
                      ).hexdigest()
                      for label, auth_url in auth_urls:
                          if token:
                              break
                          try:
                              r = requests.post(auth_url, json=plain_payload, timeout=30)
                              data = r.json()
                              if "accessToken" in data:
                                  token = data["accessToken"]
                                  print(f"  Plain auth success via {label}! userId={data.get('userId')}")
                                  status["authenticated"] = True
                                  status["auth_method"] = f"plain_auth_{label.lower()}"
                              elif "p-ticket" in data:
                                  print(f"  {label} plain: Credentials valid! p-ticket received")
                                  status["auth_method"] = "plain_captcha_needed"
                              else:
                                  err = data.get("errorText", "")
                                  print(f"  {label} plain: {err}")
                          except Exception as e:
                              print(f"  {label} plain auth error: {e}")

              elif not ssh_token:
                  print("  No credentials configured")
                  status["errors"].append("Configure SSH secrets (recommended) or TRADOVATE_USERNAME/PASSWORD")

          # ── 4. Account Status ──
          if token:
              headers = {"Authorization": f"Bearer {token}"}
              print("\n=== 4. Account Status ===")

              try:
                  r = requests.get(f"{DEMO_URL}/account/list", headers=headers, timeout=10)
                  if r.status_code == 200:
                      for a in r.json():
                          if a.get("id") == ACCOUNT_ID or len(r.json()) == 1:
                              status["account"] = {
                                  "name": a.get("name"), "id": a.get("id"), "active": a.get("active"),
                              }
                              print(f"  Account: {a.get('name')} (ID: {a.get('id')})")
              except Exception as e:
                  status["errors"].append(f"Account: {e}")

              try:
                  r = requests.get(f"{DEMO_URL}/cashBalance/getcashbalancesnapshot",
                                   headers=headers, timeout=10, params={"accountId": ACCOUNT_ID})
                  if r.status_code == 200:
                      bal = r.json()
                      status["balance"] = {
                          "realizedPnl": bal.get("realizedPnl"),
                          "unrealizedPnl": bal.get("unrealizedPnl"),
                          "totalCashValue": bal.get("totalCashValue"),
                          "initialMargin": bal.get("initialMargin"),
                          "netLiq": bal.get("netLiq"),
                      }
                      print(f"  Balance: ${bal.get('totalCashValue', 'N/A')}")
                      print(f"  P&L: realized=${bal.get('realizedPnl', 'N/A')} unrealized=${bal.get('unrealizedPnl', 'N/A')}")
              except Exception as e:
                  status["errors"].append(f"Balance: {e}")

              try:
                  r = requests.get(f"{DEMO_URL}/position/list", headers=headers, timeout=10)
                  if r.status_code == 200:
                      open_pos = [p for p in r.json() if p.get("netPos", 0) != 0]
                      status["positions"] = [
                          {"contractId": p.get("contractId"), "netPos": p.get("netPos"),
                           "netPrice": p.get("netPrice")} for p in open_pos
                      ]
                      print(f"  Open positions: {len(open_pos)}")
              except Exception as e:
                  status["errors"].append(f"Positions: {e}")

              try:
                  r = requests.get(f"{DEMO_URL}/order/list", headers=headers, timeout=10)
                  if r.status_code == 200:
                      active = [o for o in r.json() if o.get("ordStatus") in ("Working", "Accepted")]
                      status["orders"] = [
                          {"id": o.get("id"), "action": o.get("action"),
                           "qty": o.get("orderQty"), "status": o.get("ordStatus")} for o in active
                      ]
                      print(f"  Active orders: {len(active)}")
              except Exception as e:
                  status["errors"].append(f"Orders: {e}")

          # ── 5. Read existing server_status.json from repo ──
          if not status["server"] and os.path.exists("server_status.json"):
              try:
                  with open("server_status.json") as f:
                      status["server"] = json.load(f)
              except Exception:
                  pass

          # ── 6. Write results ──
          print("\n=== Summary ===")
          print(f"  API: {'OK' if status['api_reachable'] else 'DOWN'}")
          print(f"  Auth: {status['auth_method'] or 'none'}")
          print(f"  Server: {'connected' if status['server'] else 'no data'}")
          if status['server']:
              bot_active = status['server'].get('bot_active', False)
              print(f"  Bot active: {bot_active}")
              live = status['server'].get('live_status', {})
              if live:
                  print(f"  Live balance: ${live.get('balance', 'N/A')}")
                  print(f"  Day P&L: ${live.get('day_pnl', 'N/A')}")
                  print(f"  Trades today: {live.get('trades_today', 'N/A')}")
          print(f"  Errors: {len(status['errors'])}")

          with open("system_status.json", "w") as f:
              json.dump(status, f, indent=2)
          print("\nWrote system_status.json")
          PYEOF

      - name: Commit and push status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add system_status.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            AUTH=$(python3 -c "import json; d=json.load(open('system_status.json')); print(d.get('auth_method','none'))")
            API=$(python3 -c "import json; d=json.load(open('system_status.json')); print('ok' if d['api_reachable'] else 'down')")
            BOT=$(python3 -c "import json; d=json.load(open('system_status.json')); s=d.get('server') or {}; print('running' if s.get('bot_active') else 'down')")
            TRADING=$(python3 -c "import json; d=json.load(open('system_status.json')); t=d.get('trading_activity') or {}; print('active' if t.get('trading_active') else 'inactive')")
            git commit -m "status: $(date -u '+%Y-%m-%d %H:%M UTC') | api=$API auth=$AUTH bot=$BOT trading=$TRADING"
            git push origin main
            echo "Pushed to main"
          fi

      - name: Generate summary
        if: always()
        run: |
          if [ ! -f system_status.json ]; then
            echo "Status check failed." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "## System Status" >> $GITHUB_STEP_SUMMARY
          echo "**$(date -u '+%Y-%m-%d %H:%M UTC')**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          python3 << 'PYEOF' >> $GITHUB_STEP_SUMMARY
          import json
          d = json.load(open("system_status.json"))

          print("| Check | Status |")
          print("|-------|--------|")
          print(f"| API | {'OK' if d['api_reachable'] else 'DOWN'} |")
          print(f"| Auth | {d.get('auth_method') or 'none'} |")

          bal = d.get("balance", {})
          if bal:
              print(f"| Balance | ${bal.get('totalCashValue', 'N/A')} |")
              print(f"| Net Liq | ${bal.get('netLiq', 'N/A')} |")
              print(f"| Realized P&L | ${bal.get('realizedPnl', 'N/A')} |")
              print(f"| Unrealized P&L | ${bal.get('unrealizedPnl', 'N/A')} |")

          print(f"| Positions | {len(d.get('positions', []))} |")
          print(f"| Orders | {len(d.get('orders', []))} |")

          srv = d.get("server")
          if srv:
              print(f"| Bot Active | {srv.get('bot_active', '?')} |")
              print(f"| Bot PID | {srv.get('bot_pid', '?')} |")
              print(f"| Memory | {srv.get('memory', '?')} |")
              print(f"| Disk | {srv.get('disk', '?')} |")
              print(f"| Server Commit | `{srv.get('git_commit', '?')}` |")

              live = srv.get('live_status', {})
              if live:
                  print("")
                  print("### Live Bot Status (from server)")
                  print("| Field | Value |")
                  print("|-------|-------|")
                  print(f"| Balance | ${live.get('balance', 'N/A')} |")
                  print(f"| Equity | ${live.get('equity', 'N/A')} |")
                  print(f"| Day P&L | ${live.get('day_pnl', 'N/A')} |")
                  print(f"| Distance to Floor | ${live.get('distance_to_floor', 'N/A')} |")
                  print(f"| Open Contracts | {live.get('open_contracts', 'N/A')} |")
                  print(f"| Trades Today | {live.get('trades_today', 'N/A')} |")
                  print(f"| Locked | {live.get('locked', 'N/A')} |")
                  print(f"| Active Symbols | {', '.join(live.get('active_symbols', []))} |")
                  print(f"| Last Update | `{live.get('timestamp_et', '?')}` |")

          # Trading activity section
          ta = d.get("trading_activity")
          if ta:
              print("")
              print("### Trading Activity")
              print("| Metric | Value |")
              print("|--------|-------|")
              print(f"| Token | {ta.get('token_status', '?')} |")
              print(f"| Token Expiry | {ta.get('token_expiry', '?')[:19] if ta.get('token_expiry') else 'N/A'} |")
              print(f"| Trading Active | {ta.get('trading_active', False)} |")
              print(f"| WebSocket | {'Connected' if ta.get('websocket_connected') else 'Disconnected'} |")
              print(f"| Recent Signals | {len(ta.get('recent_signals', []))} |")
              print(f"| Recent Trades | {len(ta.get('recent_trades', []))} |")
              print(f"| Log Errors | {len(ta.get('errors_in_log', []))} |")

              js = ta.get("journal_summary", {})
              if js.get("total_trades", 0) > 0:
                  print(f"| Total Trades (journal) | {js.get('total_trades', 0)} |")
                  print(f"| Win Rate | {js.get('win_rate', 0):.0%} |")
                  print(f"| Total P&L | ${js.get('total_pnl', 0):,.2f} |")
                  print(f"| Trades Today | {js.get('trades_today', 0)} |")

              signals = ta.get("recent_signals", [])
              if signals:
                  print("")
                  print("### Recent Signals")
                  for s in signals[-5:]:
                      print(f"- `{s[-120:]}`")

              trades = ta.get("recent_trades", [])
              if trades:
                  print("")
                  print("### Recent Trades")
                  for t in trades[-5:]:
                      print(f"- `{t[-120:]}`")

              errors = ta.get("errors_in_log", [])
              if errors:
                  print("")
                  print("### Bot Log Errors")
                  for e in errors[-5:]:
                      print(f"- `{e[-120:]}`")

              log_tail = ta.get("bot_log_tail", [])
              if log_tail:
                  print("")
                  print("### Last 15 Log Lines")
                  print("```")
                  for line in log_tail[-15:]:
                      print(line[-150:])
                  print("```")

          errs = d.get("errors", [])
          if errs:
              print("")
              print("### Errors")
              for e in errs:
                  print(f"- {e}")

          pos = d.get("positions", [])
          if pos:
              print("")
              print("### Open Positions")
              print("| Contract | Qty | Price |")
              print("|----------|-----|-------|")
              for p in pos:
                  print(f"| {p['contractId']} | {p['netPos']} | {p.get('netPrice','?')} |")

          if not errs and not srv:
              print("")
              print("### Setup Required")
              print("To get full server monitoring, configure these GitHub secrets:")
              print("- `SERVER_HOST` — VPS IP address")
              print("- `SERVER_SSH_KEY` — SSH private key for the VPS")
              print("- `TRADOVATE_USERNAME` / `TRADOVATE_PASSWORD` — for API auth")
              print("- `TRADOVATE_ACCESS_TOKEN` — valid bearer token (optional)")
          PYEOF
