name: CI — Tests & Lint

on:
  push:
    branches: [main, master, claude/tradovate-api-research-DPnl9]
  pull_request:
    branches: [main, master, claude/tradovate-api-research-DPnl9]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Create dummy .env for tests
        run: |
          cp .env.example .env

      - name: Run test suite
        run: |
          python -m pytest test_all.py -v --tb=short

      - name: Syntax check all Python files
        run: |
          python -m py_compile bot.py
          python -m py_compile tradovate_api.py
          python -m py_compile strategies.py
          python -m py_compile risk_manager.py
          python -m py_compile config.py
          python -m py_compile trade_journal.py
          python -m py_compile auto_tuner.py
          python -m py_compile dashboard.py
          python -m py_compile status.py
          echo "All Python files compile successfully"
