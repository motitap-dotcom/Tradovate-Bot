name: Validate on push

# Fires on push to main/master — syntax check only.
# Actual deploy handled by server_cron.sh (polls every 5 min).
on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/deploy-pages.yml'
      - 'server_status.json'
      - 'system_status.json'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create dummy .env for syntax check
        run: cp .env.example .env

      - name: Syntax check
        run: |
          python -m py_compile bot.py
          python -m py_compile tradovate_api.py
          python -m py_compile strategies.py
          python -m py_compile risk_manager.py
          python -m py_compile config.py

      - name: Summary
        if: always()
        run: |
          echo "## Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Server picks up changes via \`server_cron.sh\` (every 5 min)." >> $GITHUB_STEP_SUMMARY
