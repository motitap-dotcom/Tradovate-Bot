name: Deploy to Server

# Fires on push to main/master or the deploy branch.
on:
  push:
    branches: [main, master, claude/tradovate-api-research-DPnl9]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/deploy-pages.yml'
      - 'server_status.json'
  workflow_dispatch:

env:
  BOT_DIR: /root/tradovate-bot
  SERVICE_NAME: tradovate-bot
  DEPLOY_BRANCH: claude/tradovate-api-research-DPnl9

jobs:
  # ── Step 1: Quick syntax check before deploying ──
  pre-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create dummy .env for syntax check
        run: cp .env.example .env

      - name: Syntax check
        run: |
          python -m py_compile bot.py
          python -m py_compile tradovate_api.py
          python -m py_compile strategies.py
          python -m py_compile risk_manager.py
          python -m py_compile config.py

  # ── Step 2: Deploy via SSH (requires SERVER_HOST var) ──
  deploy:
    needs: pre-check
    runs-on: ubuntu-latest
    if: vars.SERVER_HOST != ''

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USER || 'root' }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: SERVER_GH_PAT
          script_stop: true
          script: |
            echo "========================================"
            echo "  Deploying commit ${{ github.sha }}"
            echo "  Branch: ${{ github.ref_name }}"
            echo "  Time: $(date)"
            echo "========================================"

            BOT_DIR="${{ env.BOT_DIR }}"
            SERVICE="${{ env.SERVICE_NAME }}"
            BRANCH="${{ env.DEPLOY_BRANCH }}"

            cd "$BOT_DIR" || { echo "ERROR: $BOT_DIR not found"; exit 1; }

            # Pull latest code
            echo ""
            echo "--- Pulling latest code ---"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH" 2>/dev/null || true
            git reset --hard "origin/$BRANCH"
            echo "Now at: $(git log -1 --oneline)"

            # Update dependencies
            echo ""
            echo "--- Updating dependencies ---"
            if [ -f venv/bin/pip ]; then
              venv/bin/pip install -r requirements.txt -q 2>&1 | tail -5
            else
              echo "No venv found — skipping pip install"
            fi

            # Restart bot service
            echo ""
            echo "--- Restarting bot service ---"
            systemctl restart "$SERVICE"
            sleep 3

            # Verify it's running
            echo ""
            echo "--- Service status ---"
            if systemctl is-active --quiet "$SERVICE"; then
              echo "SERVICE: RUNNING"
              systemctl status "$SERVICE" --no-pager -l 2>&1 | head -10
            else
              echo "SERVICE: FAILED TO START"
              journalctl -u "$SERVICE" --no-pager -n 20
              exit 1
            fi

            # ── Setup status cron ──
            echo ""
            echo "--- Setting up status cron ---"

            # Write GH_PAT to server if provided as secret
            if [ -n "${SERVER_GH_PAT:-}" ]; then
              echo "export GH_PAT=${SERVER_GH_PAT}" > "$BOT_DIR/.gh_pat"
              chmod 600 "$BOT_DIR/.gh_pat"
              echo "GH_PAT saved."
            fi

            # Install cron if not already present
            CRON_CMD="cd $BOT_DIR && . $BOT_DIR/.gh_pat 2>/dev/null; bash server_cron.sh >> /var/log/tradovate-cron.log 2>&1"
            if ! crontab -l 2>/dev/null | grep -q "server_cron.sh"; then
              (crontab -l 2>/dev/null; echo "*/5 * * * * $CRON_CMD") | crontab -
              echo "Cron job installed (every 5 min)."
            else
              echo "Cron job already exists."
            fi

            echo ""
            echo "========================================"
            echo "  Deploy complete!"
            echo "========================================"
        env:
          SERVER_GH_PAT: ${{ secrets.SERVER_GH_PAT }}

      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy to Server" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy via SSH to \`${{ vars.SERVER_HOST }}\`" >> $GITHUB_STEP_SUMMARY

  # ── Fallback: Webhook if no SSH host configured ──
  webhook-fallback:
    needs: pre-check
    runs-on: ubuntu-latest
    if: vars.SERVER_HOST == '' && vars.DEPLOY_WEBHOOK_URL != ''

    steps:
      - name: Trigger server webhook
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"ref":"${{ github.ref }}","commit":"${{ github.sha }}","actor":"${{ github.actor }}"}' \
            "${{ vars.DEPLOY_WEBHOOK_URL }}" \
            --max-time 10 || echo "Webhook sent"

      - name: Summary
        run: |
          echo "## Deploy via Webhook" >> $GITHUB_STEP_SUMMARY
          echo "Webhook triggered for commit \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
